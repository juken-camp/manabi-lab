<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>太陽系 3D｜まなびラボ</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050b;
  --panel:rgba(14,18,32,0.85);
  --panel-line:rgba(120,150,210,0.18);
  --amber:#f5a623;
  --amber-soft:#ffce7a;
  --cyan:#5fd3e0;
  --text:#e8ecf6;
  --dim:#8893ad;
  --good:#5fe09a;
  --jp:'Zen Kaku Gothic New',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--jp);display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased}

/* ---------- header ---------- */
header{display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--panel-line);
  background:rgba(6,8,16,0.6);backdrop-filter:blur(8px);flex:none}
.navback{display:inline-flex;align-items:center;gap:7px;flex:none;border:1px solid var(--panel-line);
  background:rgba(255,255,255,.04);color:var(--text);text-decoration:none;font-size:12.5px;font-weight:600;
  padding:7px 12px;border-radius:11px;transition:.15s;white-space:nowrap}
.navback:hover{background:rgba(255,255,255,.10)}
.navback .nb-arrow{font-family:var(--mono);color:var(--dim)}
@media(max-width:620px){.navback .nb-label{display:none}.navback{padding:7px 10px}}
header .accent{width:4px;height:34px;border-radius:3px;background:linear-gradient(var(--amber),var(--amber-soft));
  box-shadow:0 0 14px rgba(245,166,35,.5)}
header h1{font-size:17px;font-weight:700;letter-spacing:.03em}
header .en{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.18em;margin-top:1px}
header .sys{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);display:flex;align-items:center;gap:7px;letter-spacing:.08em}
header .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
header .unit{color:var(--amber-soft)}

/* ---------- stage ---------- */
main{flex:1;min-height:0;position:relative}
.stage{position:absolute;inset:0;overflow:hidden}
#cv{display:block;width:100%;height:100%;touch-action:none}
.hint{position:absolute;top:12px;left:14px;font-size:11px;line-height:1.7;color:var(--dim);
  font-family:var(--mono);letter-spacing:.02em;pointer-events:none;background:rgba(6,8,16,.45);
  padding:6px 9px;border-radius:8px;border:1px solid var(--panel-line);transition:opacity .4s;z-index:10}
.hint b{color:var(--amber-soft);font-weight:600}
.hint.is-hidden{opacity:0}

/* ---------- controls（左サイド・折りたたみ） ---------- */
.controls{position:absolute;left:14px;top:50%;transform:translateY(-50%);z-index:18;
  display:flex;flex-direction:column;align-items:stretch;gap:9px;
  width:min(214px,46vw);max-height:calc(100% - 18px);overflow-y:auto;overflow-x:hidden;
  background:var(--panel);border:1px solid var(--panel-line);border-radius:16px;padding:12px;
  backdrop-filter:blur(10px);box-shadow:0 10px 40px rgba(0,0,0,.45)}
.ctl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;border:0;
  background:transparent;color:var(--dim);font-family:var(--jp);font-size:11.5px;font-weight:700;
  letter-spacing:.12em;cursor:pointer;padding:1px 2px 2px}
.ctl-head .ch-ico{transition:transform .2s;font-size:10px}
.controls.min{width:auto;min-width:0;padding:9px 13px}
.controls.min > *:not(.ctl-head){display:none}
.controls.min .ch-ico{transform:rotate(-90deg)}
.seg{display:flex;background:rgba(0,0,0,.3);border-radius:10px;padding:3px;gap:3px;width:100%}
.seg button{flex:1;border:0;background:transparent;color:var(--dim);font-family:var(--jp);font-size:12px;
  font-weight:500;padding:6px 4px;border-radius:8px;cursor:pointer;transition:.18s;text-align:center}
.seg button.on{background:linear-gradient(var(--amber),#d68a12);color:#241400;font-weight:700;
  box-shadow:0 0 12px rgba(245,166,35,.35)}
.sl{width:100%;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim)}
.sl label{flex:none;white-space:nowrap}
.sl b{flex:none;font-family:var(--mono);font-size:11px;color:var(--text);min-width:52px;text-align:right;font-weight:600}
.sl input[type=range]{flex:1;min-width:0;-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;
  background:linear-gradient(90deg,var(--amber) var(--p,50%),rgba(255,255,255,.14) var(--p,50%));outline:none}
.sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:#ffe2ad;border:2px solid #b87708;cursor:pointer}
.toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;
  font-size:12px;color:var(--dim)}
.toggle.on{color:var(--text)}
.sw{width:38px;height:21px;border-radius:12px;background:rgba(255,255,255,.14);position:relative;transition:.2s;flex:none}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#cfd6e6;transition:.2s}
.toggle.on .sw{background:var(--amber)}
.toggle.on .sw::after{left:19px;background:#241400}

/* ---------- zoom ---------- */
.zoomctl{position:absolute;right:14px;bottom:14px;z-index:18;display:flex;flex-direction:column;gap:7px}
.zoomctl button{width:40px;height:40px;border-radius:12px;border:1px solid var(--panel-line);
  background:var(--panel);color:var(--text);font-size:17px;cursor:pointer;backdrop-filter:blur(8px);
  transition:.15s;font-family:var(--mono);line-height:1}
.zoomctl button:hover{background:rgba(255,255,255,.10)}

/* ---------- 惑星チップ ---------- */
.chip{position:absolute;left:50%;bottom:16px;transform:translate(-50%,12px);z-index:16;opacity:0;
  pointer-events:none;transition:.25s;max-width:min(480px,92vw);
  background:var(--panel);border:1px solid var(--panel-line);border-radius:16px;padding:13px 18px;
  backdrop-filter:blur(10px);box-shadow:0 10px 40px rgba(0,0,0,.45)}
.chip.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.chip .head{display:flex;align-items:baseline;gap:10px;margin-bottom:7px}
.chip .pname{font-size:17px;font-weight:700}
.chip .pen{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--dim)}
.chip .ptype{margin-left:auto;font-size:10.5px;color:var(--amber-soft);border:1px solid rgba(245,166,35,.4);
  padding:2px 9px;border-radius:20px;white-space:nowrap}
.chip .rows{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:11.5px;color:var(--dim);margin-bottom:7px}
.chip .rows b{color:var(--text);font-family:var(--mono);font-weight:600;font-size:11.5px}
.chip .fact{font-size:12px;line-height:1.65;color:#c8d0e4}
.chip .cx{position:absolute;top:8px;right:10px;border:0;background:rgba(255,255,255,.06);color:var(--text);
  width:26px;height:26px;border-radius:8px;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<header>
  <a class="navback" href="./index.html" aria-label="まなびラボのトップへ戻る"><span class="nb-arrow">←</span><span class="nb-label">まなびラボ</span></a>
  <div class="accent"></div>
  <div>
    <h1>太陽系 3D</h1>
    <div class="en">SOLAR SYSTEM</div>
  </div>
  <div class="sys"><span class="dot"></span>SYS ● ONLINE&nbsp;｜&nbsp;<span class="unit">地学</span></div>
</header>

<main>
  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="hint" id="hint">ドラッグ＝<b>視点を回す</b>／<b>太陽</b>をドラッグ＝<b>全体を移動</b><br>ピンチ・ホイール＝<b>近づく/離れる</b>／惑星をタップ＝<b>くわしく見る</b><br>ダブルタップ＝<b>表示をもとに戻す</b></div>

    <div class="controls" id="controls">
      <button type="button" class="ctl-head" id="ctlHead"><span>そうさ</span><span class="ch-ico">▼</span></button>
      <div class="seg" id="playSeg">
        <button data-play="1" class="on">▶ 公転</button>
        <button data-play="0">⏸ 停止</button>
      </div>
      <div class="sl"><label>速さ</label><input type="range" id="spd" min="0" max="60" step="1" value="10"><b id="spdv">10日/秒</b></div>
      <div class="toggle on" id="orbTog"><span>軌道線</span><span class="sw"></span></div>
      <div class="toggle on" id="lblTog"><span>名前</span><span class="sw"></span></div>
    </div>

    <div class="zoomctl" id="zoomCtl">
      <button type="button" data-zz="in" aria-label="近づく">＋</button>
      <button type="button" data-zz="out" aria-label="離れる">−</button>
      <button type="button" data-zz="reset" aria-label="表示をもとに戻す">⟲</button>
    </div>

    <div class="chip" id="chip">
      <button type="button" class="cx" id="chipX" aria-label="閉じる">×</button>
      <div class="head"><span class="pname" id="cName"></span><span class="pen" id="cEn"></span><span class="ptype" id="cType"></span></div>
      <div class="rows" id="cRows"></div>
      <div class="fact" id="cFact"></div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
/* ============================================================
   太陽系 3D / まなびラボ v2
   太陽をドラッグ＝太陽系ごと移動／それ以外をドラッグ＝視点回転
   ============================================================ */
const TAU=Math.PI*2;
const cv=document.getElementById('cv');
const stage=document.querySelector('.stage');

/* ---------- 惑星データ（表示用の距離・大きさは見やすく圧縮） ---------- */
const PLANETS=[
 {jp:'水星',en:'MERCURY',type:'地球型（岩石）',col:0xb8ada0, orb:9,  size:0.55, period:88,    au:0.39, dia:'4,879 km',
  fact:'太陽にいちばん近い惑星。大気がほとんどなく、昼は約400℃・夜は約−170℃と温度差がはげしい。'},
 {jp:'金星',en:'VENUS',  type:'地球型（岩石）',col:0xe8c97a, orb:12.5,size:0.85, period:224.7, au:0.72, dia:'12,104 km',
  fact:'厚い二酸化炭素の大気の温室効果で表面は約460℃。地球から見ると月のように満ち欠けして見える。'},
 {jp:'地球',en:'EARTH',  type:'地球型（岩石）',col:0x5f9fe0, orb:16, size:0.9,  period:365.25,au:1.00, dia:'12,756 km',
  fact:'液体の水と生命が確認されている、いまのところ唯一の惑星。1回の公転がちょうど1年。'},
 {jp:'火星',en:'MARS',   type:'地球型（岩石）',col:0xd97a52, orb:20, size:0.7,  period:687,   au:1.52, dia:'6,792 km',
  fact:'赤く見えるのは表面の酸化鉄（さび）の色。太陽系最大の火山オリンポス山がある。'},
 {jp:'木星',en:'JUPITER',type:'木星型（ガス）',col:0xd9a878, orb:31, size:3.0,  period:4333,  au:5.20, dia:'142,984 km',
  fact:'太陽系最大の惑星。おもに水素とヘリウムのガスでできていて、大赤斑という巨大なうずがある。'},
 {jp:'土星',en:'SATURN', type:'木星型（ガス）',col:0xe6cf9a, orb:42, size:2.5,  period:10759, au:9.58, dia:'120,536 km',
  fact:'氷の粒でできた巨大な環をもつ。平均密度は水より小さく、「水に浮く」とたとえられる。'},
 {jp:'天王星',en:'URANUS',type:'木星型（巨大氷）',col:0x9fdce0, orb:53, size:1.6, period:30687, au:19.2, dia:'51,118 km',
  fact:'自転軸が横倒しになっていて、ころがるように公転している。メタンの大気で青緑色に見える。'},
 {jp:'海王星',en:'NEPTUNE',type:'木星型（巨大氷）',col:0x5f7fe0, orb:64, size:1.55,period:60190, au:30.1, dia:'49,528 km',
  fact:'太陽系のいちばん外側の惑星。計算によって存在が予言され、その場所で発見された。'},
];
const SUN={jp:'太陽',en:'SUN',type:'恒星',col:0xffd76e,size:4.2,dia:'1,392,700 km',
  fact:'みずから光る恒星。太陽系の質量のほとんど（約99.8%）は太陽がしめている。惑星はそのまわりを公転する。'};

/* ---------- 状態 ---------- */
const state={ playing:true, speed:10, simDays:0, orbits:true, labels:true, selected:-2 }; // -2:なし / -1:太陽 / 0..7:惑星

/* ---------- three.js セットアップ ---------- */
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:false});
renderer.setClearColor(0x04050b,1);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(48,1,0.1,2000);

/* カメラ（自前オービット） */
const DEF={yaw:-0.65,pitch:0.62,dist:120};
const cam={yaw:DEF.yaw,pitch:DEF.pitch,dist:DEF.dist,target:new THREE.Vector3(0,0,0)};
function applyCamera(){
  const cp=Math.cos(cam.pitch), sp=Math.sin(cam.pitch);
  camera.position.set(
    cam.target.x + cam.dist*cp*Math.cos(cam.yaw),
    cam.target.y + cam.dist*sp,
    cam.target.z + cam.dist*cp*Math.sin(cam.yaw));
  camera.lookAt(cam.target);
}

/* ライト */
scene.add(new THREE.AmbientLight(0x33384a,0.9));
const sunLight=new THREE.PointLight(0xfff1d0,1.5,0,2);
scene.add(sunLight);

/* 星空 */
(function stars(){
  const N=1500, pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const r=420+Math.random()*380, th=Math.random()*TAU, ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.cos(ph); pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xaab4d4,size:1.1,sizeAttenuation:false,transparent:true,opacity:.8})));
})();

/* テクスチャ（発光スプライト・文字ラベル）をcanvasで作る */
function glowTexture(inner,outer){
  const c=document.createElement('canvas'); c.width=c.height=128;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,2,64,64,62);
  g.addColorStop(0,inner); g.addColorStop(0.35,outer); g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
function labelSprite(text){
  const c=document.createElement('canvas'); c.width=256; c.height=80;
  const x=c.getContext('2d');
  x.font="700 34px 'Zen Kaku Gothic New',sans-serif";
  x.textAlign='center'; x.textBaseline='middle';
  x.shadowColor='rgba(0,0,0,.9)'; x.shadowBlur=10;
  x.fillStyle='#e8ecf6'; x.fillText(text,128,40);
  const t=new THREE.CanvasTexture(c);
  const m=new THREE.SpriteMaterial({map:t,transparent:true,depthWrite:false});
  const s=new THREE.Sprite(m);
  s.scale.set(10,3.1,1);
  return s;
}

/* 太陽 */
const sunGroup=new THREE.Group(); scene.add(sunGroup);
const sunMesh=new THREE.Mesh(new THREE.SphereGeometry(SUN.size,40,40),
  new THREE.MeshBasicMaterial({color:SUN.col}));
sunGroup.add(sunMesh);
const sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTexture('rgba(255,236,170,0.95)','rgba(245,166,35,0.35)'),
  transparent:true,depthWrite:false}));
sunGlow.scale.set(SUN.size*5.2,SUN.size*5.2,1);
sunGroup.add(sunGlow);
const sunPick=new THREE.Mesh(new THREE.SphereGeometry(SUN.size+1.4,12,12),
  new THREE.MeshBasicMaterial({visible:false}));
sunPick.userData.idx=-1;
sunGroup.add(sunPick);
const sunLabel=labelSprite('太陽'); sunLabel.position.y=SUN.size+2.4; sunGroup.add(sunLabel);

/* 惑星 */
const planetObjs=[], pickMeshes=[sunPick], orbitLines=[];
PLANETS.forEach((p,i)=>{
  const grp=new THREE.Group(); scene.add(grp);
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(p.size,28,28),
    new THREE.MeshLambertMaterial({color:p.col}));
  grp.add(mesh);
  const pick=new THREE.Mesh(new THREE.SphereGeometry(Math.max(p.size,1.7),10,10),
    new THREE.MeshBasicMaterial({visible:false}));
  pick.userData.idx=i; grp.add(pick); pickMeshes.push(pick);
  const lbl=labelSprite(p.jp); lbl.position.y=p.size+1.9; grp.add(lbl);
  let ring=null;
  if(p.en==='SATURN'){
    ring=new THREE.Mesh(new THREE.RingGeometry(p.size*1.35,p.size*2.1,48),
      new THREE.MeshBasicMaterial({color:0xd9c28e,side:THREE.DoubleSide,transparent:true,opacity:0.55}));
    ring.rotation.x=Math.PI/2-0.35; grp.add(ring);
  }
  /* 軌道線 */
  const N=128, pos=new Float32Array(N*3);
  for(let k=0;k<N;k++){ const a=k/N*TAU; pos[k*3]=Math.cos(a)*p.orb; pos[k*3+1]=0; pos[k*3+2]=Math.sin(a)*p.orb; }
  const og=new THREE.BufferGeometry(); og.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const ol=new THREE.LineLoop(og,new THREE.LineBasicMaterial({color:0x6a78a0,transparent:true,opacity:0.32}));
  scene.add(ol); orbitLines.push(ol);
  planetObjs.push({grp,mesh,lbl,phase:Math.random()*TAU});
});

/* ---------- 配置更新 ---------- */
function planetPos(i,out){
  const p=PLANETS[i], a=planetObjs[i].phase + (state.simDays/p.period)*TAU;
  out.set(Math.cos(a)*p.orb, 0, Math.sin(a)*p.orb);
  return out;
}
const _v=new THREE.Vector3();
function updatePositions(){
  for(let i=0;i<PLANETS.length;i++){
    planetPos(i,_v);
    planetObjs[i].grp.position.copy(_v);
    planetObjs[i].mesh.rotation.y += 0.003*(state.playing?1:0);
  }
}

/* ---------- 入力（回転 / 太陽ドラッグ＝全体移動 / ピンチ / タップ選択） ---------- */
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
function pickAt(clientX,clientY){
  const r=cv.getBoundingClientRect();
  ndc.set(((clientX-r.left)/r.width)*2-1, -((clientY-r.top)/r.height)*2+1);
  ray.setFromCamera(ndc,camera);
  const hits=ray.intersectObjects(pickMeshes,false);
  return hits.length? hits[0].object.userData.idx : null;   // -1:太陽 / 0..:惑星 / null:なし
}
function worldPerPixel(){
  return 2*cam.dist*Math.tan(camera.fov*Math.PI/360)/cv.clientHeight;
}
function panBy(dx,dy){
  const wpp=worldPerPixel();
  const right=new THREE.Vector3(), up=new THREE.Vector3();
  camera.matrix.extractBasis(right,up,new THREE.Vector3());
  cam.target.addScaledVector(right,-dx*wpp);
  cam.target.addScaledVector(up,dy*wpp);
}
function resetView(){
  cam.yaw=DEF.yaw; cam.pitch=DEF.pitch; cam.dist=DEF.dist;
  cam.target.set(0,0,0); select(-2);
}

const pts=new Map();
let mode=null;            // 'rotate' | 'pan' | 'pinch'
let downInfo=null, pinch=null, lastUp=0;

cv.addEventListener('pointerdown',e=>{
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  try{ cv.setPointerCapture(e.pointerId); }catch(err){}
  if(pts.size===2){
    const a=[...pts.values()];
    pinch={d:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)||1, mx:(a[0].x+a[1].x)/2, my:(a[0].y+a[1].y)/2};
    mode='pinch';
  }else if(pts.size===1){
    const hit=pickAt(e.clientX,e.clientY);
    downInfo={x:e.clientX,y:e.clientY,t:Date.now(),hit,moved:false};
    mode = (hit===-1)? 'pan' : 'rotate';   // 太陽をつかんだら全体移動
  }
  hintEl.classList.add('is-hidden');
});
cv.addEventListener('pointermove',e=>{
  if(!pts.has(e.pointerId)) return;
  const prev=pts.get(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(mode==='pinch' && pts.size>=2){
    const a=[...pts.values()];
    const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y)||1;
    const mx=(a[0].x+a[1].x)/2, my=(a[0].y+a[1].y)/2;
    cam.dist=Math.min(320,Math.max(14,cam.dist*pinch.d/d));
    panBy(mx-pinch.mx,my-pinch.my);
    pinch={d,mx,my};
    e.preventDefault();
    return;
  }
  if(!downInfo) return;
  const dx=e.clientX-prev.x, dy=e.clientY-prev.y;
  if(Math.hypot(e.clientX-downInfo.x,e.clientY-downInfo.y)>7) downInfo.moved=true;
  if(mode==='pan'){ panBy(dx,dy); e.preventDefault(); }
  else if(mode==='rotate'){
    cam.yaw += dx*0.0052;
    cam.pitch=Math.min(1.45,Math.max(-1.45,cam.pitch+dy*0.0042));
    e.preventDefault();
  }
});
function endPt(e){
  const had=pts.has(e.pointerId);
  pts.delete(e.pointerId);
  if(pts.size<2) pinch=null;
  if(pts.size===0){
    if(had && downInfo && e.type==='pointerup'){
      const now=Date.now();
      if(!downInfo.moved && now-downInfo.t<400){
        /* タップ：選択 or 解除、ダブルタップでリセット */
        if(now-lastUp<330){ resetView(); }
        else if(downInfo.hit!==null){ select(downInfo.hit); }
        else{ select(-2); }
        lastUp=now;
      }
    }
    mode=null; downInfo=null;
  }
  else if(pts.size===1){ mode=null; downInfo=null; }
}
window.addEventListener('pointerup',endPt);
window.addEventListener('pointercancel',endPt);
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  cam.dist=Math.min(320,Math.max(14,cam.dist*Math.pow(1.0016,e.deltaY)));
},{passive:false});

/* ---------- 選択チップ＋追尾 ---------- */
const chip=document.getElementById('chip');
function select(idx){
  state.selected=idx;
  if(idx===-2){ chip.classList.remove('show'); return; }
  const d= idx===-1 ? SUN : PLANETS[idx];
  document.getElementById('cName').textContent=d.jp;
  document.getElementById('cEn').textContent=d.en;
  document.getElementById('cType').textContent=d.type;
  let rows='';
  if(idx>=0){
    const yr=(d.period/365.25);
    rows+='<span>公転周期 <b>'+(d.period<1000? d.period+'日' : Math.round(d.period).toLocaleString()+'日')+'（'+(yr<1?yr.toFixed(2):yr.toFixed(1))+'年）</b></span>';
    rows+='<span>太陽から <b>'+d.au.toFixed(2)+' AU</b></span>';
  }
  rows+='<span>直径 <b>'+d.dia+'</b></span>';
  document.getElementById('cRows').innerHTML=rows;
  document.getElementById('cFact').textContent=d.fact;
  chip.classList.add('show');
}
document.getElementById('chipX').addEventListener('click',()=>select(-2));

/* ---------- コントロール ---------- */
const hintEl=document.getElementById('hint');
const ctl=document.getElementById('controls');
document.getElementById('ctlHead').addEventListener('click',()=>ctl.classList.toggle('min'));
const playSeg=document.getElementById('playSeg');
playSeg.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  state.playing=b.dataset.play==='1';
  playSeg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',(x.dataset.play==='1')===state.playing));
}));
const spd=document.getElementById('spd');
function syncSpd(){ spd.style.setProperty('--p',(spd.value/60*100)+'%');
  document.getElementById('spdv').textContent=spd.value+'日/秒'; }
spd.addEventListener('input',()=>{ state.speed=+spd.value; syncSpd(); });
syncSpd();
function bindTog(id,key,fn){ const t=document.getElementById(id);
  t.addEventListener('click',()=>{ state[key]=!state[key]; t.classList.toggle('on',state[key]); fn(); }); }
bindTog('orbTog','orbits',()=>orbitLines.forEach(l=>l.visible=state.orbits));
bindTog('lblTog','labels',()=>{ planetObjs.forEach(o=>o.lbl.visible=state.labels); sunLabel.visible=state.labels; });

document.querySelectorAll('#zoomCtl button').forEach(b=>{
  b.addEventListener('click',()=>{
    if(b.dataset.zz==='in') cam.dist=Math.max(14,cam.dist/1.3);
    else if(b.dataset.zz==='out') cam.dist=Math.min(320,cam.dist*1.3);
    else resetView();
  });
});

/* ---------- ループ＆リサイズ ---------- */
function resize(){
  const r=stage.getBoundingClientRect();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  renderer.setPixelRatio(dpr);
  renderer.setSize(r.width,r.height,false);
  camera.aspect=r.width/r.height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
resize();

let last=performance.now();
function loop(t){
  const dt=Math.min((t-last)/1000,0.05); last=t;
  if(state.playing) state.simDays += state.speed*dt;
  updatePositions();
  /* 選択中の天体を追いかける */
  if(state.selected>=0){ planetPos(state.selected,_v); cam.target.lerp(_v,0.12); }
  else if(state.selected===-1){ cam.target.lerp(sunGroup.position,0.12); }
  applyCamera();
  /* ラベルは距離に応じて少しだけ大きさを保つ */
  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

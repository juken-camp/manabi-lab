<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>太陽系シミュレーター 3D｜理科教材</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg:#04050b; --panel:rgba(14,18,32,0.85); --panel-line:rgba(120,150,210,0.18);
    --amber:#f5a623; --amber-soft:#ffce7a; --cyan:#5fd3e0; --cyan-soft:#9ff0fb; --text:#e8ecf6; --dim:#8893ad;
    --good:#5fe09a; --bad:#ff7a7a;
    --jp:'Zen Kaku Gothic New',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;touch-action:none}
  body{background:
    radial-gradient(1200px 700px at 18% -10%, rgba(245,166,35,0.10), transparent 60%),
    radial-gradient(900px 800px at 110% 120%, rgba(95,211,224,0.08), transparent 55%),var(--bg);
    color:var(--text);font-family:var(--jp);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

  header{display:flex;align-items:center;gap:14px;padding:11px 18px;
    border-bottom:1px solid var(--panel-line);background:rgba(6,8,16,0.6);backdrop-filter:blur(8px);flex:none}
  header .accent{width:4px;height:34px;border-radius:3px;
    background:linear-gradient(var(--amber),var(--amber-soft));box-shadow:0 0 14px rgba(245,166,35,.5)}
  header h1{font-size:18px;font-weight:700;letter-spacing:.04em}
  header .en{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.20em;margin-top:1px}
  header .sys{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);
    display:flex;align-items:center;gap:7px;letter-spacing:.08em}
  header .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  header .unit{color:var(--amber-soft)}

  main{flex:1;display:grid;grid-template-columns:1fr 318px;min-height:0}
  .stage{position:relative;min-height:0;overflow:hidden}
  canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
  canvas:active{cursor:grabbing}

  /* HTML label overlay */
  .labels{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .lbl{position:absolute;transform:translate(-50%,-50%);white-space:nowrap;font-size:12px;color:#cfd6ea;text-shadow:0 1px 3px #000;display:flex;flex-direction:column;line-height:1.1}
  .lbl .en{font-family:var(--mono);font-size:8.5px;color:rgba(136,147,173,.85);letter-spacing:.1em}
  .lbl.sel{color:var(--amber-soft);font-weight:700}

  .hint{position:absolute;top:12px;left:14px;max-width:250px;font-size:11px;line-height:1.7;color:var(--dim);
    font-family:var(--mono);letter-spacing:.02em;pointer-events:none;
    background:rgba(6,8,16,.4);padding:6px 9px;border-radius:8px;border:1px solid var(--panel-line)}
  .hint b{color:var(--amber-soft);font-weight:600}
  .elapsed{position:absolute;top:12px;right:14px;text-align:right;font-family:var(--mono);pointer-events:none}
  .elapsed .lbl2{font-size:10px;letter-spacing:.2em;color:var(--dim)}
  .elapsed .val{font-size:21px;color:var(--amber-soft);font-weight:600}

  .controls{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);
    display:flex;align-items:center;gap:13px;flex-wrap:wrap;justify-content:center;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:16px;
    padding:11px 16px;backdrop-filter:blur(10px);max-width:95%;box-shadow:0 10px 40px rgba(0,0,0,.45)}
  .seg{display:flex;background:rgba(0,0,0,.3);border-radius:10px;padding:3px;gap:3px}
  .seg button{border:0;background:transparent;color:var(--dim);font-family:var(--jp);
    font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.18s}
  .seg button.on{background:linear-gradient(var(--amber),#e0911a);color:#1a1206;font-weight:700;box-shadow:0 0 12px rgba(245,166,35,.35)}
  .sl{display:flex;align-items:center;gap:9px}
  .sl label{font-size:12px;color:var(--dim)}
  .sl input[type=range]{-webkit-appearance:none;appearance:none;width:108px;height:4px;border-radius:3px;
    background:linear-gradient(90deg,var(--amber) 0%,var(--amber) var(--p,0%),rgba(255,255,255,.14) var(--p,0%));outline:none;cursor:pointer}
  .sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--amber-soft);box-shadow:0 0 10px rgba(245,166,35,.7);cursor:pointer}
  .sl input[type=range]::-moz-range-thumb{width:16px;height:16px;border:0;border-radius:50%;
    background:var(--amber-soft);box-shadow:0 0 10px rgba(245,166,35,.7);cursor:pointer}
  .sl b{font-family:var(--mono);font-size:13px;color:var(--amber-soft);min-width:44px;text-align:right}
  .toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--dim);user-select:none}
  .sw{width:38px;height:21px;border-radius:12px;background:rgba(255,255,255,.14);position:relative;transition:.2s}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#cfd6e6;transition:.2s}
  .toggle.on .sw{background:var(--cyan)}
  .toggle.on .sw::after{left:19px;background:#06222a}
  .toggle.on{color:var(--text)}
  .btn{font-family:var(--jp);color:var(--text);background:rgba(255,255,255,0.04);border:1px solid var(--panel-line);
    border-radius:11px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{background:rgba(255,255,255,.09)}
  .btn.primary{background:linear-gradient(var(--amber),#e0911a);color:#1a1206;border:0;box-shadow:0 0 14px rgba(245,166,35,.3)}

  .legend{position:absolute;right:14px;bottom:14px;display:none;flex-direction:column;gap:6px;font-size:11px;color:var(--dim);background:var(--panel);border:1px solid var(--panel-line);border-radius:10px;padding:9px 11px;backdrop-filter:blur(10px);max-width:240px;line-height:1.5}
  .legend.show{display:flex}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:middle}

  aside{border-left:1px solid var(--panel-line);background:rgba(8,11,20,.55);display:flex;flex-direction:column;min-height:0}
  .tabbar{display:flex;border-bottom:1px solid var(--panel-line);flex:none}
  .tabbar button{flex:1;border:0;background:transparent;color:var(--dim);font-family:var(--jp);
    font-size:13px;font-weight:500;padding:13px 0;cursor:pointer;position:relative;transition:.18s}
  .tabbar button.on{color:var(--text)}
  .tabbar button.on::after{content:"";position:absolute;left:18%;right:18%;bottom:-1px;height:2px;
    border-radius:2px;background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .panelbody{flex:1;overflow-y:auto;padding:16px}
  .panelbody::-webkit-scrollbar{width:7px}
  .panelbody::-webkit-scrollbar-thumb{background:rgba(120,150,210,.25);border-radius:4px}
  .pl-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .pl-dot{width:26px;height:26px;border-radius:50%;flex:none;box-shadow:0 0 16px currentColor}
  .pl-name{font-size:20px;font-weight:700}
  .pl-en{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--dim)}
  .pl-tag{display:inline-block;margin:8px 0 6px;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--panel-line);color:var(--amber-soft)}
  .stat{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:11px 13px;margin-top:9px;
    border:1px solid var(--panel-line);border-radius:11px;background:rgba(255,255,255,.02)}
  .stat .k{font-size:12px;color:var(--dim);flex:none}
  .stat .v{font-family:var(--mono);font-size:13px;text-align:right}
  .stat .v small{color:var(--dim);font-size:10px}
  .desc{margin-top:14px;font-size:13px;line-height:1.85;color:#c8d0e4;
    padding:11px 13px;border-left:2px solid var(--cyan);background:rgba(95,211,224,.05);border-radius:0 8px 8px 0}
  .focusbtn{width:100%;margin-top:16px}
  .empty{color:var(--dim);font-size:13px;line-height:1.9;text-align:center;margin-top:40px}
  .empty .big{font-size:34px;display:block;margin-bottom:10px}
  .cmp-row{display:flex;align-items:center;gap:12px;margin-bottom:13px;cursor:pointer}
  .cmp-bar{height:14px;border-radius:7px;flex:none;min-width:4px;box-shadow:0 0 10px currentColor}
  .cmp-lbl{font-size:12px;color:var(--dim)}
  .cmp-lbl b{color:var(--text);font-weight:500}
  .cmp-num{font-family:var(--mono);font-size:11px;color:var(--dim);margin-left:auto}
  .cmp-note{font-size:11px;color:var(--dim);line-height:1.8;margin-top:6px}

  .quiz-q{font-size:14.5px;font-weight:500;line-height:1.7;margin-bottom:14px}
  .quiz-q .num{font-family:var(--mono);color:var(--amber-soft);margin-right:8px}
  .quiz-prog{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;margin-bottom:10px}
  .quiz-fb{font-size:13px;line-height:1.7;margin-top:10px;padding:12px 14px;border-radius:11px;display:none}
  .quiz-fb.show{display:block}
  .quiz-fb.ok{background:rgba(95,224,154,.1);color:var(--good);border:1px solid rgba(95,224,154,.3)}
  .quiz-fb.ng{background:rgba(255,122,122,.1);color:var(--bad);border:1px solid rgba(255,122,122,.3)}
  .quiz-fb .lab{font-weight:700;margin-right:6px}
  .quiz-result{text-align:center;padding:18px 0}
  .quiz-result .score{font-family:var(--mono);font-size:42px;font-weight:600;color:var(--amber-soft)}
  .quiz-result .lab{font-size:13px;color:var(--dim);margin:6px 0 18px}

  .panel-toggle{display:none}
  .panel-close{display:none}
  @media(max-width:820px){
    main{grid-template-columns:1fr}
    aside{position:fixed;top:0;right:0;width:min(330px,86vw);height:100%;z-index:30;
      transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
      background:rgba(8,11,20,.97);backdrop-filter:blur(12px)}
    aside.open{transform:translateX(0);box-shadow:-20px 0 60px rgba(0,0,0,.6)}
    .panel-toggle{display:flex;position:absolute;top:12px;right:14px;z-index:20;align-items:center;gap:6px;
      border:1px solid var(--panel-line);background:var(--panel);color:var(--text);font-family:var(--jp);
      font-size:12px;font-weight:600;padding:8px 13px;border-radius:11px;cursor:pointer;backdrop-filter:blur(8px)}
    .panel-close{display:block;position:absolute;top:10px;right:12px;z-index:5;border:0;background:rgba(255,255,255,.06);
      color:var(--text);width:32px;height:32px;border-radius:9px;font-size:17px;cursor:pointer}
    .controls{bottom:12px;padding:10px 12px;gap:10px}
    .sl input[type=range]{width:80px}
    .hint{font-size:10px;max-width:200px}
    .legend{bottom:12px}
  }
</style>

<style id="manabi-responsive">
/* ===== まなびラボ 表示強化（操作パネルを左サイドに縦配置 / 自動追加） ===== */
.hint{transition:opacity .4s ease}
.hint.is-hidden{opacity:0;pointer-events:none}

/* 操作パネルを左サイドに縦並びで配置（中央のシミュレーションを隠さない） */
.controls{
  left:14px !important; right:auto !important; bottom:auto !important; top:50% !important;
  transform:translateY(-50%) !important;
  flex-direction:column !important; align-items:stretch !important; flex-wrap:nowrap !important;
  gap:9px !important; width:min(214px,46vw) !important; max-width:214px !important;
  max-height:calc(100% - 18px) !important; overflow-y:auto !important; overflow-x:hidden !important;
  padding:12px !important;
}
.controls > button{width:100% !important; justify-content:center !important; white-space:nowrap !important}
.controls .sl{width:100% !important; display:flex !important; align-items:center !important; gap:7px !important}
.controls .sl label{flex:0 0 auto !important; white-space:nowrap !important}
.controls .sl input[type=range]{flex:1 1 auto !important; width:auto !important; min-width:0 !important}
.controls .sl b{flex:0 0 auto !important; white-space:nowrap !important; text-align:right !important}
.controls .seg{width:100% !important; display:flex !important}
.controls .seg button{flex:1 1 0 !important; padding:6px 4px !important; text-align:center !important}
.controls .toggle{width:100% !important; display:flex !important; align-items:center !important; justify-content:space-between !important}

/* 使い方ヒントは下中央へ（左の操作パネルと重ならないように） */
.hint{left:50% !important; right:auto !important; top:auto !important; bottom:12px !important;
  transform:translateX(-50%) !important; max-width:80vw !important; text-align:center !important}

/* 横向きスマホなど高さが低い画面でも、右パネル(データ)は引き出し式に */
@media (max-height:520px) and (max-width:1100px){
  main{grid-template-columns:1fr !important}
  aside{position:fixed !important;top:0;right:0;width:min(330px,86vw);height:100%;z-index:30;
    transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    background:rgba(8,11,20,.97);backdrop-filter:blur(12px);border-left:1px solid var(--panel-line)}
  aside.open{transform:translateX(0);box-shadow:-20px 0 60px rgba(0,0,0,.6)}
  .panel-toggle{display:flex !important;position:absolute;top:10px;right:12px;z-index:20;
    align-items:center;gap:6px;border:1px solid var(--panel-line);background:var(--panel);
    color:var(--text);font-family:var(--jp);font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:11px;cursor:pointer;backdrop-filter:blur(8px)}
  .panel-close{display:block !important;position:absolute;top:10px;right:12px;z-index:5;border:0;
    background:rgba(255,255,255,.06);color:var(--text);width:32px;height:32px;
    border-radius:9px;font-size:17px;cursor:pointer}
  .controls{width:min(196px,52vw) !important;max-width:196px !important;
    max-height:calc(100% - 14px) !important;padding:10px !important;gap:7px !important}
}

/* 縦向きスマホ：横向きをやさしく案内 */
.rotate-tip{display:none}
@media (max-width:820px) and (orientation:portrait){
  .rotate-tip{display:flex;position:fixed;inset:0;z-index:90;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;padding:32px;text-align:center;
    background:rgba(4,5,11,.94);backdrop-filter:blur(7px)}
  .rotate-tip.is-hidden{display:none}
  .rotate-tip .rt-ic{font-size:50px;animation:rt-turn 2.6s ease-in-out infinite;transform-origin:center}
  @keyframes rt-turn{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(80deg)}}
  .rotate-tip .rt-msg{font-size:16px;font-weight:700;line-height:1.7;color:var(--text)}
  .rotate-tip .rt-sub{font-size:12px;color:var(--dim);margin-top:-6px}
  .rotate-tip .rt-x{margin-top:4px;border:1px solid var(--panel-line);
    background:rgba(255,255,255,.05);color:var(--text);font-family:var(--jp);
    font-size:13px;font-weight:600;padding:11px 22px;border-radius:12px;cursor:pointer}
}
</style>
</head>
<body>
<header>
  <div class="accent"></div>
  <div>
    <h1>太陽系 3D</h1>
    <div class="en">SOLAR SYSTEM · 3D</div>
  </div>
  <div class="sys"><span class="dot"></span>SYS ● ONLINE&nbsp;｜&nbsp;<span class="unit">地学</span></div>
</header>

<main>
  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="labels" id="labels"></div>
    <div class="hint" id="hint">
      <b>1本指でドラッグ</b> 視点を回す（神様視点）<br>
      <b>2本指でピンチ</b> 拡大・縮小<br>
      <b>タップ</b> 惑星を選ぶ
    </div>
    <div class="elapsed">
      <div class="lbl2">SIMULATED TIME</div>
      <div class="val"><span id="ey">0.0</span> <small style="font-size:13px;color:var(--dim)">年</small></div>
    </div>
    <button class="panel-toggle" id="ptog">☰ データ</button>

    <div class="controls">
      <button class="btn primary" id="play">⏸ 一時停止</button>
      <div class="sl"><label>速さ</label><input type="range" id="speed" min="0" max="100" value="38"><b class="speedval" id="speedv">×1.0</b></div>
      <div class="seg" id="scaleSeg">
        <button data-scale="log" class="on">対数</button>
        <button data-scale="linear">実比率</button>
        <button data-scale="equal">等間隔</button>
      </div>
      <div class="toggle on" id="tgOrbit"><span>軌道</span><span class="sw"></span></div>
      <div class="toggle on" id="tgLabel"><span>名前</span><span class="sw"></span></div>
      <div class="toggle" id="tgType"><span>型で色分け</span><span class="sw"></span></div>
      <button class="btn" id="reset">全体に戻す</button>
    </div>
    <div class="legend" id="legend">
      <span><i style="background:var(--amber)"></i>地球型惑星（水・金・地・火／小さく岩石）</span>
      <span><i style="background:var(--cyan)"></i>木星型惑星（木・土・天・海／大きくガス・氷）</span>
    </div>
  </div>

  <aside id="aside">
    <button class="panel-close" id="pclose">×</button>
    <div class="tabbar">
      <button data-tab="info" class="on">惑星データ</button>
      <button data-tab="compare">大きさ比べ</button>
      <button data-tab="quiz">クイズ</button>
    </div>
    <div class="panelbody" id="panelbody"></div>
  </aside>
</main>

<script>
/* ===== 天体データ ===== */
const PLANETS=[
 {jp:'水星',en:'MERCURY',color:'#b7a999',au:0.39,period:0.241,rotation:'58.6日',diameter:4879,moons:0,tag:'太陽に最も近い',desc:'太陽系で最も小さい惑星。大気がほとんどなく、昼は約430℃、夜は約-180℃と温度差が極端に大きい。',tilt:0.03,spin:0.5},
 {jp:'金星',en:'VENUS',color:'#e8c07d',au:0.72,period:0.615,rotation:'243日(逆回転)',diameter:12104,moons:0,tag:'最も高温の惑星',desc:'分厚い二酸化炭素の大気による温室効果で、表面温度は約460℃。自転の向きが他の惑星と逆という珍しい特徴をもつ。',tilt:0.05,spin:-0.2},
 {jp:'地球',en:'EARTH',color:'#6ba8e0',au:1.00,period:1.0,rotation:'24時間',diameter:12742,moons:1,tag:'生命の惑星',desc:'液体の水と酸素を含む大気をもち、生命が確認されている唯一の天体。太陽からの距離がちょうどよく、水が液体で存在できる。',tilt:0.41,spin:1.2},
 {jp:'火星',en:'MARS',color:'#d27a4a',au:1.52,period:1.881,rotation:'24.6時間',diameter:6779,moons:2,tag:'赤い惑星',desc:'酸化鉄(さび)を含む土で赤く見える。太陽系最大の火山オリンポス山がある。かつて水が流れた跡が見つかっている。',tilt:0.44,spin:1.1},
 {jp:'木星',en:'JUPITER',color:'#caa978',au:5.20,period:11.86,rotation:'9.9時間',diameter:139820,moons:95,tag:'太陽系最大',desc:'主に水素とヘリウムでできた巨大なガス惑星。地球が約1300個入る大きさ。巨大な渦「大赤斑」が有名。',tilt:0.05,spin:2.6},
 {jp:'土星',en:'SATURN',color:'#e3c98a',au:9.58,period:29.46,rotation:'10.7時間',diameter:116460,moons:146,tag:'美しい環をもつ',ring:true,desc:'氷や岩のかけらでできた巨大な環をもつガス惑星。密度が水より小さく、巨大な水槽があれば浮くといわれる。',tilt:0.47,spin:2.4},
 {jp:'天王星',en:'URANUS',color:'#9ad7da',au:19.2,period:84.0,rotation:'17.2時間(横倒し)',diameter:50724,moons:28,tag:'横倒しで自転',desc:'自転軸がほぼ横に倒れた状態で公転する。メタンの大気により青緑色に見える。表面温度は約-200℃と非常に低い。',tilt:1.5,spin:1.4},

function typeCol(i,a){return i<4?`rgba(245,166,35,${a})`:`rgba(95,211,224,${a})`;}

/* ===== 3D セットアップ ===== */

const SUNR=7, BASE=130;

const angles=PLANETS.map(()=>Math.random()*Math.PI*2);

// 星空
(function(){
  const g=new THREE.BufferGeometry(); const N=1800; const pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){const r=700+Math.random()*500,t=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(t);pos[i*3+1]=r*Math.cos(ph);pos[i*3+2]=r*Math.sin(ph)*Math.sin(t);}
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));

// 太陽
function sunTexture(){
  const c=document.createElement('canvas');c.width=256;c.height=128;const x=c.getContext('2d');
  x.fillStyle='#ffce62';x.fillRect(0,0,256,128);
  let seed=99;const rnd=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  for(let k=0;k<260;k++){x.globalAlpha=0.10;x.fillStyle=k%2?'#ffb23e':'#fff2bf';
    x.beginPath();x.arc(rnd()*256,rnd()*128,2+rnd()*7,0,Math.PI*2);x.fill();}
  x.globalAlpha=1;return new THREE.CanvasTexture(c);
}
const sun=new THREE.Mesh(new THREE.SphereGeometry(SUNR,40,40),new THREE.MeshBasicMaterial({map:sunTexture(),color:0xffe9a8}));
scene.add(sun);
const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:makeGlow(),color:0xffc24d,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
glow.scale.set(46,46,1); scene.add(glow);
function makeGlow(){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);g.addColorStop(0,'rgba(255,220,140,1)');g.addColorStop(.3,'rgba(245,166,35,.6)');g.addColorStop(1,'rgba(245,166,35,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);}

/* ===== 惑星の手続きテクスチャ（初回のみ生成・軽量） ===== */
function shadeHex(hex,f){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const t=f<0?0:255, a=Math.abs(f);
  r=Math.round(r+(t-r)*a); g=Math.round(g+(t-g)*a); b=Math.round(b+(t-b)*a);
  return 'rgb('+r+','+g+','+b+')';
}
function planetTexture(i,p){
  const W=256,H=128,c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');
  let seed=20+i*7;const rnd=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  x.fillStyle=p.color; x.fillRect(0,0,W,H);
  if(i===4||i===5){            // 木星・土星：縞模様
    const n=i===4?9:7;
    for(let k=0;k<n;k++){
      x.globalAlpha=i===4?0.8:0.5;
      x.fillStyle=k%2?shadeHex(p.color,-0.18):shadeHex(p.color,0.16);
      x.fillRect(0,k*H/n,W,H/n+1);
    }
    x.globalAlpha=0.12;x.fillStyle='#ffffff';
    for(let k=0;k<14;k++){x.fillRect(0,rnd()*H,W,1.4);}
    x.globalAlpha=1;
    if(i===4){                 // 大赤斑
      x.fillStyle='#c4593a';x.beginPath();x.ellipse(W*0.68,H*0.62,16,9,0,0,Math.PI*2);x.fill();
      x.fillStyle='rgba(255,212,184,0.5)';x.beginPath();x.ellipse(W*0.68,H*0.62,9,5,0,0,Math.PI*2);x.fill();
    }
  }else if(i===6||i===7){      // 天王星・海王星：なめらか＋淡い帯
    for(let k=0;k<5;k++){
      x.globalAlpha=0.45;
      x.fillStyle=k%2?shadeHex(p.color,-0.08):shadeHex(p.color,0.08);
      x.fillRect(0,k*H/5,W,H/5+1);
    }
    x.globalAlpha=1;
    if(i===7){x.fillStyle='rgba(20,40,120,0.5)';x.beginPath();x.ellipse(W*0.4,H*0.42,12,7,0,0,Math.PI*2);x.fill();}
  }else if(i===2){             // 地球：海・大陸・雲・極
    x.fillStyle='#2f6fb4';x.fillRect(0,0,W,H);
    x.fillStyle='#3f9d63';
    for(let k=0;k<10;k++){
      const cx=rnd()*W, cy=H*0.18+rnd()*H*0.64, rw=14+rnd()*30, rh=8+rnd()*14, rot=rnd()*3;
      x.beginPath();x.ellipse(cx,cy,rw,rh,rot,0,Math.PI*2);x.fill();
      if(cx<rw){x.beginPath();x.ellipse(cx+W,cy,rw,rh,rot,0,Math.PI*2);x.fill();}
      if(cx>W-rw){x.beginPath();x.ellipse(cx-W,cy,rw,rh,rot,0,Math.PI*2);x.fill();}
    }
    x.fillStyle='rgba(255,255,255,0.85)';x.fillRect(0,0,W,7);x.fillRect(0,H-7,W,7);
    x.globalAlpha=0.32;x.fillStyle='#ffffff';
    for(let k=0;k<16;k++){x.beginPath();x.ellipse(rnd()*W,rnd()*H,16+rnd()*22,3+rnd()*4,0,0,Math.PI*2);x.fill();}
    x.globalAlpha=1;
  }else if(i===3){             // 火星：さび＋暗い地形＋極冠
    for(let k=0;k<26;k++){
      x.globalAlpha=0.16;x.fillStyle=k%2?'#8c4326':'#e09a6a';
      x.beginPath();x.ellipse(rnd()*W,rnd()*H,10+rnd()*26,6+rnd()*12,rnd()*3,0,Math.PI*2);x.fill();
    }
    x.globalAlpha=1;x.fillStyle='rgba(255,255,255,0.9)';x.fillRect(0,0,W,6);x.fillRect(0,H-5,W,5);
  }else if(i===0){             // 水星：クレーター
    for(let k=0;k<40;k++){
      x.globalAlpha=0.18;x.fillStyle=k%2?'#7c6f60':'#d8ccba';
      x.beginPath();x.arc(rnd()*W,rnd()*H,1.5+rnd()*5,0,Math.PI*2);x.fill();
    }
    x.globalAlpha=1;
  }else{                       // 金星：クリーム色の雲のうず
    for(let k=0;k<8;k++){
      x.globalAlpha=0.14;x.fillStyle=k%2?'#c89a55':'#f7dfae';
      x.beginPath();x.ellipse(W/2,H/2,W*0.55,6+k*7,0,0,Math.PI*2);x.fill();
    }
    x.globalAlpha=1;
  }
  return new THREE.CanvasTexture(c);
}

// 惑星 + 軌道
const planetObjs=[];
PLANETS.forEach((p,i)=>{
  const pr=1.0+Math.log10(p.diameter/3000+1)*1.6;
  const grp=new THREE.Group(); grp.rotation.z=p.tilt;
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(pr,32,32),
    new THREE.MeshStandardMaterial({map:planetTexture(i,p),roughness:.85,metalness:.05}));
  mesh.userData.i=i; grp.add(mesh);
  if(i===2){ // 地球の大気（うすい青のシェル・選択判定には含めない）
    const atm=new THREE.Mesh(new THREE.SphereGeometry(pr*1.08,32,32),
      new THREE.MeshBasicMaterial({color:0x6ea8ff,transparent:true,opacity:0.16,side:THREE.BackSide,depthWrite:false}));
    grp.add(atm);
  }
  if(p.ring){
    const ring=new THREE.Mesh(new THREE.RingGeometry(pr*1.5,pr*2.4,48),
      new THREE.MeshBasicMaterial({color:0xe3c98a,side:THREE.DoubleSide,transparent:true,opacity:.75}));
    ring.rotation.x=Math.PI/2.2; grp.add(ring);
  }
  scene.add(grp);
  // 軌道リング（単位円を XZ 平面に）
  const segs=128, op=new Float32Array((segs+1)*3);
  for(let s=0;s<=segs;s++){const a=s/segs*Math.PI*2;op[s*3]=Math.cos(a);op[s*3+1]=0;op[s*3+2]=Math.sin(a);}
  const og=new THREE.BufferGeometry();og.setAttribute('position',new THREE.BufferAttribute(op,3));
  const orbit=new THREE.Line(og,new THREE.LineBasicMaterial({color:0x6b87cc,transparent:true,opacity:.25}));
  scene.add(orbit);
  planetObjs.push({grp,mesh,orbit,pr});
});

// 選択リング
const selRing=new THREE.Mesh(new THREE.RingGeometry(1,1.12,48),new THREE.MeshBasicMaterial({color:0xf5a623,side:THREE.DoubleSide}));
selRing.visible=false; scene.add(selRing);

// 軌道半径
function orbitR(i){
  const p=PLANETS[i]; let r;
  if(scaleMode==='equal') r=BASE*((i+1)/PLANETS.length);
  else if(scaleMode==='linear') r=BASE*(p.au/PLANETS[7].au);
  else{const a=Math.log(PLANETS[0].au),b=Math.log(PLANETS[7].au);r=BASE*(0.14+0.86*(Math.log(p.au)-a)/(b-a));}
  return Math.max(r, SUNR+planetObjs[i].pr+2);
}
function applyScale(){planetObjs.forEach((o,i)=>{const r=orbitR(i);o.orbit.scale.set(r,1,r);});}
applyScale();

/* ===== カメラ操作（マウス＆タッチ共通） ===== */
const target=new THREE.Vector3(0,0,0);
let radius=300, theta=0.7, phi=0.95;
const RMIN=5, RMAX=1700;
let followIndex=null, flying=false, desiredRadius=300;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const pointers=new Map(); let pinchStart=0, pinchRad=0;
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY,sx:e.clientX,sy:e.clientY,moved:0});
  if(pointers.size===2){const a=[...pointers.values()];pinchStart=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);pinchRad=radius;}});
canvas.addEventListener('pointermove',e=>{const p=pointers.get(e.pointerId);if(!p)return;
  const dx=e.clientX-p.x,dy=e.clientY-p.y;p.x=e.clientX;p.y=e.clientY;p.moved+=Math.abs(dx)+Math.abs(dy);
  if(pointers.size===1){theta-=dx*0.005;phi=clamp(phi-dy*0.005,0.08,Math.PI-0.08);}
  else if(pointers.size>=2){const a=[...pointers.values()];const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
    if(pinchStart>0){radius=clamp(pinchRad*(pinchStart/d),RMIN,RMAX);flying=false;}}});
function endPtr(e){const p=pointers.get(e.pointerId);
  if(p&&p.moved<7&&pointers.size===1)trySelect(p.sx,p.sy);
  pointers.delete(e.pointerId);pinchStart=0;}
canvas.addEventListener('pointerup',endPtr);
canvas.addEventListener('pointercancel',e=>{pointers.delete(e.pointerId);pinchStart=0;});
canvas.addEventListener('wheel',e=>{e.preventDefault();radius=clamp(radius*(e.deltaY<0?0.88:1.13),RMIN,RMAX);flying=false;},{passive:false});

const raycaster=new THREE.Raycaster(); const ndc=new THREE.Vector2();
function trySelect(cx,cy){const r=canvas.getBoundingClientRect();
  ndc.x=((cx-r.left)/r.width)*2-1; ndc.y=-((cy-r.top)/r.height)*2+1;
  raycaster.setFromCamera(ndc,camera);
  const hits=raycaster.intersectObjects(planetObjs.map(o=>o.mesh));
  if(hits.length){selected=hits[0].object.userData.i;switchTab('info');renderPanel();}}

/* ===== ループ ===== */
let last=performance.now();
function animate(t){
  const dt=Math.min((t-last)/1000,0.05);last=t;
  if(running)elapsedYears+=speed*dt;
  // 惑星位置・自転
  planetObjs.forEach((o,i)=>{
    const p=PLANETS[i], r=orbitR(i);
    const a=angles[i]+(elapsedYears/p.period)*Math.PI*2;
    o.grp.position.set(Math.cos(a)*r,0,Math.sin(a)*r);
    if(running)o.mesh.rotation.y+=dt*p.spin*0.6;
    o.orbit.visible=showOrbit;
    o.orbit.material.color.set(showType?(i<4?0xf5a623:0x5fd3e0):0x6b87cc);
    o.orbit.material.opacity=showType?0.4:0.25;
  });
  // 選択リング
  if(selected!==null){const o=planetObjs[selected];selRing.visible=true;
    selRing.position.copy(o.grp.position);const s=o.pr+2.4;selRing.scale.set(s,s,s);
    selRing.lookAt(camera.position);}
  else selRing.visible=false;
  // カメラ追従/フライ
  if(followIndex!==null)target.lerp(planetObjs[followIndex].grp.position,0.12);
  if(flying){radius+=(desiredRadius-radius)*0.1;if(Math.abs(radius-desiredRadius)<1)flying=false;}
  const sp=Math.sin(phi);
  camera.position.set(target.x+radius*sp*Math.cos(theta),target.y+radius*Math.cos(phi),target.z+radius*sp*Math.sin(theta));
  camera.lookAt(target);
  renderer.render(scene,camera);
  updateLabels();
  document.getElementById('ey').textContent=elapsedYears.toFixed(1);
  requestAnimationFrame(animate);
}

/* ===== HTMLラベル ===== */
const labelLayer=document.getElementById('labels'); const labelEls=[];
(function(){
  const mk=(jp,en)=>{const d=document.createElement('div');d.className='lbl';d.innerHTML=`<span>${jp}</span><span class="en">${en}</span>`;labelLayer.appendChild(d);return d;};
  labelEls.push(mk('太陽','SUN'));
  PLANETS.forEach(p=>labelEls.push(mk(p.jp,p.en)));
})();
const tmp=new THREE.Vector3();
function updateLabels(){
  const W=canvas.clientWidth,H=canvas.clientHeight;
  const place=(el,obj,idx)=>{
    if(!showLabel){el.style.display='none';return;}
    tmp.setFromMatrixPosition(obj.matrixWorld?obj.matrixWorld:obj.matrix);
    if(obj.getWorldPosition)obj.getWorldPosition(tmp);
    const v=tmp.clone().project(camera);
    if(v.z>1||v.z<-1){el.style.display='none';return;}
    el.style.display='flex';
    el.style.left=((v.x*0.5+0.5)*W)+'px';
    el.style.top=((-v.y*0.5+0.5)*H-18)+'px';
    if(idx!==null){el.classList.toggle('sel',selected===idx);
      el.querySelector('span').style.color=selected===idx?'':(showType?typeCol(idx,0.95):'');}
  };
  place(labelEls[0],sun,null);
  planetObjs.forEach((o,i)=>place(labelEls[i+1],o.grp,i));
}

  camera.aspect=r.width/r.height;camera.updateProjectionMatrix();}

document.getElementById('play').onclick=togglePlay;

speedEl.oninput=applySpeed;applySpeed();

/* ===== サイドパネル ===== */
let activeTab='info';
document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
function switchTab(tab){activeTab=tab;document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));renderPanel();document.getElementById('aside').classList.add('open');}
function renderPanel(){const body=document.getElementById('panelbody');
  if(activeTab==='info'){body.innerHTML=infoHTML();const f=document.getElementById('focusbtn');if(f)f.onclick=()=>focusPlanet(selected);}
  else if(activeTab==='compare'){body.innerHTML=compareHTML();document.querySelectorAll('.cmp-row').forEach(r=>r.onclick=()=>{selected=+r.dataset.i;switchTab('info');});}
  else{body.innerHTML=quizHTML();bindQuiz();}}

function infoHTML(){
  if(selected===null)return `<div class="empty"><span class="big">🪐</span>画面で惑星をタップすると、<br>くわしいデータが表示されます。</div>`;
  const p=PLANETS[selected];
  const days=p.period<1?Math.round(p.period*365)+'日':p.period.toFixed(1)+'年';
  const es=(p.diameter/PLANETS[2].diameter).toFixed(p.diameter/PLANETS[2].diameter<2?2:1);
  return `<div class="pl-head"><div class="pl-dot" style="background:${p.color};color:${p.color}"></div>
    <div><div class="pl-name">${p.jp}</div><div class="pl-en">${p.en}</div></div></div>
    <div class="pl-tag">${p.tag}</div>
    <div class="stat"><span class="k">分類</span><span class="v" style="color:${selected<4?'var(--amber)':'var(--cyan)'}">${p.type}<br><small>${p.orbitGroup}</small></span></div>
    <div class="stat"><span class="k">太陽からの距離</span><span class="v">${(p.au*AU_KM).toFixed(2)} 億km<br><small>${p.au} AU（地球=1）</small></span></div>
    <div class="stat"><span class="k">公転周期</span><span class="v">${days}<br><small>太陽を1周する時間</small></span></div>
    <div class="stat"><span class="k">自転周期</span><span class="v">${p.rotation}<br><small>1回転する時間</small></span></div>
    <div class="stat"><span class="k">直径</span><span class="v">${p.diameter.toLocaleString()} km<br><small>地球の約${es}倍</small></span></div>
    <div class="stat"><span class="k">衛星の数</span><span class="v">${p.moons===0?'なし':p.moons+' 個'}</span></div>
    <div class="desc">${p.desc}</div>
    <button class="primary focusbtn" id="focusbtn">🔭 この惑星に近づいて見る</button>`;
}
function compareHTML(){
  const max=Math.max(...PLANETS.map(p=>p.diameter));
  const row=(p,i)=>{const w=Math.max(4,(p.diameter/max)*200);
    return `<div class="cmp-row" data-i="${i}"><div class="cmp-bar" style="width:${w}px;background:${p.color};color:${p.color}"></div><div class="cmp-lbl"><b>${p.jp}</b></div><div class="cmp-num">${p.diameter.toLocaleString()} km</div></div>`;};
  const terr=PLANETS.map((p,i)=>i<4?row(p,i):'').join('');
  const jov=PLANETS.map((p,i)=>i>=4?row(p,i):'').join('');
  return `<div style="font-size:13px;margin-bottom:16px;color:var(--dim);line-height:1.8">惑星の<b style="color:var(--text)">直径</b>を同じ縮尺で比べたものです。</div>
   <div style="font-size:12px;color:var(--amber);font-weight:700;margin:4px 0 10px">● 地球型惑星（岩石・小さい）</div>${terr}
   <div style="font-size:12px;color:var(--cyan);font-weight:700;margin:18px 0 10px">● 木星型惑星（ガス・氷・大きい）</div>${jov}
   <div class="cmp-note">※ 地球型は小さく密度が大きい岩石の惑星、木星型は大きく密度が小さいガス・氷の惑星。太陽の直径は約140万kmで、木星でもその1/10ほどです。バーをタップでデータが開きます。</div>`;
}
const QBANK=[
 {q:'太陽から3番目の惑星はどれ？',a:2},{q:'太陽系で最も大きい惑星はどれ？',a:4},
 {q:'美しい環(リング)をもつ惑星はどれ？',a:5},{q:'太陽に最も近い惑星はどれ？',a:0},
 {q:'「赤い惑星」とよばれるのはどれ？',a:3},{q:'公転周期が最も長い惑星はどれ？',a:7},
 {q:'表面温度が最も高い、温室効果のはげしい惑星はどれ？',a:1},{q:'自転軸が横に倒れて回っている惑星はどれ？',a:6},
 {q:'木星型惑星のうち、太陽に最も近いものはどれ？',a:4},{q:'地球型惑星のうち、最も外側を公転しているものはどれ？',a:3},
 {q:'内惑星（水星・金星）のうち、より外側を回るのはどれ？',a:1},{q:'いちばん外側を回る木星型惑星はどれ？',a:7},
];
let quiz=null;
function quizHTML(){
  if(!quiz||!quiz.active)return `<div class="empty"><span class="big">📝</span>惑星クイズに挑戦！<br>問題を読んで、画面で<br>正しい惑星をタップしよう。<button class="btn primary" id="qstart" style="margin-top:14px">クイズを始める</button></div>`;
  const cur=quiz.order[quiz.idx];let fb='';
  if(quiz.feedback)fb=`<div class="quiz-fb show ${quiz.feedback.ok?'ok':'ng'}">${quiz.feedback.msg}</div>`;
  let next='';
  if(quiz.feedback)next=quiz.idx<quiz.order.length-1?`<button class="btn primary" id="qnext">次の問題 →</button>`:`<button class="btn primary" id="qdone">結果を見る</button>`;
  return `<div class="quiz-prog">Q ${quiz.idx+1} / ${quiz.order.length} ・ SCORE ${quiz.score}</div><div class="quiz-q"><span class="num">Q${quiz.idx+1}</span>${QBANK[cur].q}</div>${fb}${next}`;
}
function bindQuiz(){const s=document.getElementById('qstart');if(s)s.onclick=startQuiz;
  const n=document.getElementById('qnext');if(n)n.onclick=()=>{quiz.idx++;quiz.feedback=null;renderPanel();};
  const d=document.getElementById('qdone');if(d)d.onclick=finishQuiz;}
function startQuiz(){const order=[...Array(QBANK.length).keys()].sort(()=>Math.random()-0.5).slice(0,6);quiz={active:true,order,idx:0,score:0,feedback:null};renderPanel();}
function finishQuiz(){const sc=quiz.score,tot=quiz.order.length;const msg=sc===tot?'パーフェクト！惑星マスターだね🌟':sc>=tot*0.6?'よくできました！':'もう一度チャレンジしてみよう。';
  document.getElementById('panelbody').innerHTML=`<div class="quiz-result"><div class="score">${sc}/${tot}</div><div class="lab">${msg}</div><button class="btn primary" id="qretry">もう一度</button></div>`;
  document.getElementById('qretry').onclick=startQuiz;quiz.active=false;}
// クイズ中のタップ判定（惑星選択に割り込む）
const origTrySelect=trySelect;
trySelect=function(cx,cy){
  if(quiz&&quiz.active&&!quiz.feedback&&activeTab==='quiz'){
    const r=canvas.getBoundingClientRect();ndc.x=((cx-r.left)/r.width)*2-1;ndc.y=-((cy-r.top)/r.height)*2+1;
    raycaster.setFromCamera(ndc,camera);const hits=raycaster.intersectObjects(planetObjs.map(o=>o.mesh));
    if(hits.length){const hit=hits[0].object.userData.i,cor=QBANK[quiz.order[quiz.idx]].a,ok=hit===cor;
      if(ok)quiz.score++;selected=cor;
      quiz.feedback={ok,msg:ok?`正解！ ${PLANETS[cor].jp}です。 ${PLANETS[cor].tag}。`:`おしい！ 正解は <b>${PLANETS[cor].jp}</b>。 あなたが選んだのは ${PLANETS[hit].jp} でした。`};
      renderPanel();}
    return;
  }
  origTrySelect(cx,cy);
};

/* ===== 起動 ===== */
resize();renderPanel();requestAnimationFrame(animate);
</script>

<div class="rotate-tip" id="manabiRotate">
  <div class="rt-ic">📱</div>
  <div class="rt-msg">横向きにすると<br>見やすくなります</div>
  <div class="rt-sub">スマホを横に回してください</div>
  <button class="rt-x" id="manabiRotateX">このまま縦で使う</button>
</div>
<script>
(function(){
  "use strict";
  var doc=document;
  /* 1) canvasのサイズを常に親要素に合わせ続ける
        （スマホのアドレスバー出入り・画面回転で高さが変わっても崩れないように） */
  var cv=doc.getElementById('cv');
  if(cv && cv.parentElement && typeof resize==='function'){
    var lw=-1, lh=-1;
    var tick=function(){
      var r=cv.parentElement.getBoundingClientRect();
      var w=Math.round(r.width), h=Math.round(r.height);
      if(w>0 && h>0 && (w!==lw || h!==lh)){ lw=w; lh=h; try{ resize(); }catch(e){} }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }
  /* 2) 操作を始めたら左上のヒントをそっと消す（小さい画面で邪魔にならないように） */
  var hint=doc.querySelector('.hint');
  var stage=doc.querySelector('.stage');
  if(hint && stage){
    stage.addEventListener('pointerdown', function(){ hint.classList.add('is-hidden'); }, {once:true});
  }
  /* 3) 縦向き案内を閉じる */
  var rx=doc.getElementById('manabiRotateX'), rt=doc.getElementById('manabiRotate');
  if(rx && rt){ rx.addEventListener('click', function(){ rt.classList.add('is-hidden'); }); }
})();
</script>
</body>
